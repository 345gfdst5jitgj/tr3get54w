<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME TERMINAL</title>
    <style>
        :root {
            --matrix-green: #00ff66;
            --bg-dark: #020403;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--matrix-green);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas-matrix {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
        }

        .terminal-container {
            position: relative;
            z-index: 3;
            background: rgba(6, 12, 8, 0.95);
            border: 2px solid var(--matrix-green);
            box-shadow: 0 0 35px rgba(0, 255, 102, 0.35);
            padding: 40px;
            transition: all 0.3s ease-in-out;
        }

        #auth-panel {
            width: 440px;
            text-align: center;
        }

        .hud-title {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-align: left;
            border-left: 4px solid var(--matrix-green);
            padding-left: 10px;
        }

        .crypto-input {
            width: 100%;
            background: #000000;
            border: 1px solid var(--matrix-green);
            padding: 16px;
            color: var(--matrix-green);
            font-size: 1.6rem;
            letter-spacing: 8px;
            text-align: center;
            outline: none;
            margin-bottom: 25px;
        }

        .neon-btn {
            width: 100%;
            background: rgba(0, 255, 102, 0.06);
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            padding: 16px;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 4px;
            cursor: pointer;
        }

        .neon-btn:hover {
            background: var(--matrix-green);
            color: #000000;
        }

        .error-msg {
            color: #ff2a2a;
            font-size: 0.85rem;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }

        #game-panel {
            width: 92vw;
            max-width: 1200px;
            height: 85vh;
            display: none;
            flex-direction: column;
            opacity: 0;
        }

        .panel-header {
            border-bottom: 1px dashed var(--matrix-green);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .game-card {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(0, 255, 102, 0.25);
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .game-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .game-url {
            font-size: 0.75rem;
            color: rgba(0, 255, 102, 0.4);
            word-break: break-all;
            margin-bottom: 15px;
            display: block;
        }

        .game-desc {
            font-size: 0.85rem;
            color: rgba(0, 255, 102, 0.7);
            line-height: 1.6;
            margin-bottom: 30px;
            border-top: 1px dashed rgba(0, 255, 102, 0.15);
            padding-top: 12px;
        }

        .launch-btn {
            background: rgba(0, 255, 102, 0.05);
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            padding: 12px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 3px;
            display: block;
        }

        .launch-btn:hover {
            background: var(--matrix-green);
            color: #000000;
        }
    </style>
</head>
<body>

    <canvas id="canvas-matrix"></canvas>
    <div class="crt-overlay"></div>

    <!-- 密码验证界面 -->
    <div class="terminal-container" id="auth-panel">
        <div class="hud-title">CRITICAL_LOCK</div>
        <input type="password" id="password-field" class="crypto-input" placeholder="ENTER ACCESS KEY" maxlength="12" autocomplete="off" autofocus>
        <button type="button" id="submit-btn" class="neon-btn">[ EXECUTE DECRYPTION ]</button>
        <div class="error-msg" id="error-prompt">⚠️ ACCESS DENIED</div>
    </div>

    <!-- 游戏矩阵主页 -->
    <div class="terminal-container" id="game-panel">
        <div class="panel-header">
            <div class="hud-title" style="margin: 0; padding: 0; border: none; font-size: 1.8rem;">GAME STORAGE MATRIX</div>
        </div>

        <div class="game-grid">
            <!-- 游戏 1 -->
            <div class="game-card">
                <div>
                    <div class="game-title">moderclient</div>
                    <span class="game-url">https://github.io</span>
                    <div class="game-desc">基于底层网元架构与 Web 汇编环境编译的游戏核心。支持高动态响应模拟。</div>
                </div>
                <a href="https://github.io" target="_blank" class="launch-btn">LAUNCH GAME</a>
            </div>

            <!-- 空槽位 -->
            <div class="game-card" style="opacity: 0.25; border-style: dashed;">
                <div>
                    <div class="game-title">[ EMPTY NODE_02 ]</div>
                    <span class="game-url">NONE // UNLINKED</span>
                    <div class="game-desc">等待后续云端存储协议数据包注入。</div>
                </div>
                <a href="#" class="launch-btn" style="pointer-events: none;">DISCONNECTED</a>
            </div>
        </div>
    </div>

    <script>
        // 代码雨引擎
        const canvas = document.getElementById('canvas-matrix');
        const ctx = canvas.getContext('2d');
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        const codeChars = "0101010101X78F6A2C9B8E3D5F017423984ADCF";
        const fontSize = 16;
        let columns = Math.floor(canvas.width / fontSize);
        let rainDrops = Array(columns).fill(0).map(() => Math.floor(Math.random() * -30));

        function drawMatrix() {
            ctx.fillStyle = 'rgba(2, 4, 3, 0.14)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold ' + fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = codeChars.charAt(Math.floor(Math.random() * codeChars.length));
                const x = i * fontSize; const y = rainDrops[i] * fontSize;
                if (y > 0) {
                    ctx.fillStyle = Math.random() > 0.98 ? '#ffffff' : `rgba(0, 255, 102, ${Math.random() * 0.4 + 0.6})`;
                    ctx.fillText(text, x, y);
                }
                if (y > canvas.height && Math.random() > 0.98) { rainDrops[i] = 0; }
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // 强效原生事件解密逻辑
        const passwordInput = document.getElementById('password-field');
        const submitButton = document.getElementById('submit-btn');
        const errorPrompt = document.getElementById('error-prompt');
        const authPanel = document.getElementById('auth-panel');
        const gamePanel = document.getElementById('game-panel');

        function doUnlockVerification() {
            if (passwordInput.value.trim() === "76887") {
                errorPrompt.style.display = "none";
                authPanel.style.opacity = "0";
                setTimeout(() => {
                    authPanel.style.display = "none";
                    gamePanel.style.display = "flex";
                    gamePanel.offsetHeight; 
                    gamePanel.style.opacity = "1";
                }, 300);
            } else {
                errorPrompt.style.display = "block";
                passwordInput.value = "";
                passwordInput.focus();
            }
        }

        submitButton.addEventListener('click', function(e) { e.preventDefault(); doUnlockVerification(); });
        passwordInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); doUnlockVerification(); } });
    </script>
</body>
</html>
