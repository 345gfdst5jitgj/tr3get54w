<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>核心游戏中心</title>
    <style>
        :root {
            --theme-primary: #00ff66;
            --theme-hover: #00cc52;
            --theme-glow: rgba(0, 255, 102, 0.25);
            --dark-border: #141730;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #080914;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .theme-selector {
            position: absolute;
            top: 25px;
            left: 25px;
            background: #111326;
            border: 2px solid var(--dark-border);
            padding: 10px 18px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .theme-selector span {
            font-size: 0.75rem;
            color: #5c62f7;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .color-dot:hover { transform: scale(1.25); }
        .color-dot.active { border-color: #ffffff; transform: scale(1.15); }
        .dot-green { background-color: #00ff66; box-shadow: 0 0 8px rgba(0,255,102,0.4); }
        .dot-blue  { background-color: #00f3ff; box-shadow: 0 0 8px rgba(0,243,255,0.4); }
        .dot-red   { background-color: #ff3366; box-shadow: 0 0 8px rgba(255,51,102,0.4); }
        .dot-yellow { background-color: #ffcc00; box-shadow: 0 0 8px rgba(255,204,0,0.4); }

        #auth-panel {
            background: #121429;
            border: 2px solid var(--dark-border);
            border-radius: 8px;
            padding: 45px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        #auth-panel::before {
            content: ''; position: absolute; top: -2px; left: -2px; width: 15px; height: 15px;
            border-top: 3px solid var(--theme-primary); border-left: 3px solid var(--theme-primary);
            transition: border-color 0.3s;
        }

        .auth-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--theme-primary);
            margin-bottom: 30px;
            letter-spacing: 2px;
            transition: color 0.3s;
        }

        .crypto-input {
            width: 100%;
            background-color: #090a14;
            border: 2px solid var(--dark-border);
            padding: 15px;
            color: #ffffff;
            font-size: 1.3rem;
            text-align: center;
            outline: none;
            border-radius: 6px;
            margin-bottom: 25px;
            transition: border-color 0.3s;
        }
        .crypto-input:focus { border-color: var(--theme-primary); }

        .submit-btn {
            width: 100%;
            background-color: var(--theme-primary);
            color: #080914;
            border: none;
            padding: 15px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            box-shadow: 0 4px 15px var(--theme-glow);
            transition: all 0.3s;
        }
        .submit-btn:hover {
            background-color: var(--theme-hover);
            box-shadow: 0 6px 20px var(--theme-glow);
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
            font-weight: 600;
        }

        #game-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 40px 20px;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 45px;
            letter-spacing: 3px;
        }

        .game-mainframe-box {
            position: relative;
            background: #111326;
            border: 2px solid var(--dark-border);
            border-radius: 12px;
            padding: 6px; 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .game-mainframe-box:hover {
            border-color: var(--theme-primary);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 25px var(--theme-glow);
        }

        .game-card {
            background: linear-gradient(145deg, #181135 0%, #0e1020 100%);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            width: 290px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 35px 25px 25px 25px;
        }

        .game-icon {
            width: 65px;
            height: 65px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .game-icon svg {
            width: 55%;
            height: 55%;
            fill: var(--theme-primary);
            filter: drop-shadow(0 0 8px var(--theme-glow));
            transition: fill 0.3s, filter 0.3s;
        }

        .game-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .launch-btn {
            width: 100%;
            background-color: var(--theme-primary);
            color: #080914;
            border: none;
            padding: 14px 0;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 12px var(--theme-glow);
            transition: all 0.2s ease;
        }
        .launch-btn:hover {
            background-color: var(--theme-hover);
            box-shadow: 0 6px 18px var(--theme-glow);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="theme-selector">
        <span>THEME</span>
        <div class="color-dot dot-green active" onclick="switchTheme('#00ff66', '#00cc52', 'rgba(0,255,102,0.25)', this)"></div>
        <div class="color-dot dot-blue" onclick="switchTheme('#00f3ff', '#00b0cc', 'rgba(0,243,255,0.25)', this)"></div>
        <div class="color-dot dot-red" onclick="switchTheme('#ff3366', '#cc2452', 'rgba(255,51,102,0.25)', this)"></div>
        <div class="color-dot dot-yellow" onclick="switchTheme('#ffcc00', '#cca300', 'rgba(255,204,0,0.25)', this)"></div>
    </div>

    <div id="auth-panel">
        <div class="auth-title">SECURITY ACCESS</div>
        <input type="password" id="password-field" class="crypto-input" placeholder="PASSWORD" autocomplete="off" autofocus>
        <button type="button" id="submit-btn" class="submit-btn">AUTHENTICATE</button>
        <div class="error-msg" id="error-prompt">ACCESS DENIED</div>
    </div>

    <div id="game-panel">
        <h1 class="page-title">游戏中心</h1>
        <div class="game-mainframe-box">
            <div class="game-card">
                <div class="game-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M18.85 4.54l1.41 1.41c.39.39.39 1.02 0 1.41l-1.83 1.83-2.83-2.83 1.83-1.83c.39-.39 1.03-.39 1.42 0M2 22l6.41-6.41c-.08-.34-.04-.71.12-1.05.27-.55.85-.9 1.47-.9h.01l4.01-4.01c-.13-.3-.15-.65-.04-.97.23-.62.83-1.03 1.5-1.02l-4.47-4.47C10.23 2.38 9.1 2 7.94 2c-1.83 0-3.56.71-4.85 2C1.12 6 0 8.71 0 11.58c0 2.22.68 4.3 1.95 6.04L2 22.01M16 11l.03-.03c.67.01 1.27-.4 1.5-1.02.11-.32.09-.67-.04-.97l4.01-4.01c.62.02 1.2-.33 1.47-.88.24-.5.21-1.09-.08-1.57l-3.05 3.05-2.83-2.83 3.05-3.05c-.48-.29-1.07-.32-1.57-.08-.55.27-.9.85-.88 1.47l-4.01 4.01c-.3-.13-.65-.15-.97-.04-.62.23-1.03.83-1.02 1.5L16 11z"/>
                    </svg>
                </div>
                <div class="game-name">modern client</div>
                <button type="button" id="launch-game-btn" class="launch-btn">立即玩玩</button>
            </div>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password-field');
        const submitButton = document.getElementById('submit-btn');
        const errorPrompt = document.getElementById('error-prompt');
        const authPanel = document.getElementById('auth-panel');
        const gamePanel = document.getElementById('game-panel');
        const launchGameButton = document.getElementById('launch-game-btn');

        function checkPassword() {
            if (passwordInput.value.trim() === "76887") {
                errorPrompt.style.display = "none";
                authPanel.style.display = "none";
                gamePanel.style.display = "flex";
            } else {
                errorPrompt.style.display = "block";
passwordInput.value = "";passwordInput.focus();}}submitButton.addEventListener('click', function(e) { e.preventDefault(); checkPassword(); });passwordInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); checkPassword(); } });launchGameButton.addEventListener('click', function() {window.open("github.io", "_blank");});function switchTheme(primaryColor, hoverColor, glowColor, element) {document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));element.classList.add('active');document.documentElement.style.setProperty('--theme-primary', primaryColor);document.documentElement.style.setProperty('--theme-hover', hoverColor);document.documentElement.style.setProperty('--theme-glow', glowColor);}{content: }
